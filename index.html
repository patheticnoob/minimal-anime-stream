<!doctype html>
<html lang="en" data-theme="nothing" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GojoStream</title>
    <!-- Apply dark theme immediately before any JS loads -->
    <script>
      (function() {
        var saved = localStorage.getItem('nothing-dark-mode');
        var isDark = saved === null ? true : saved === 'true';
        document.documentElement.setAttribute('data-theme', 'nothing');
        if (isDark) {
          document.documentElement.classList.add('dark');
          document.documentElement.classList.remove('light');
        } else {
          document.documentElement.classList.add('light');
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <!-- Google Cast SDK -->
    <script type="text/javascript" src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
